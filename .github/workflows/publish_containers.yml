name: Publish Container Image

on:
  push:
    tags:
      - '*'

jobs:
  publish-container:
    name: publish-container
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
         global-json-file: global.json

    - name: "Update release notes"
      shell: pwsh
      run: |
        ./build.ps1

    - name: Set up Docker
      uses: docker/setup-docker-action@v5
      with:
        daemon-config: |
          {
            "debug": true,
            "features": {
              "containerd-snapshotter": true
            }
          }

    - name: Log in to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: "build and push docker images"
      run: |
        dotnet publish -p:VersionPrefix=${{ github.ref_name }} -p:ContainerRegistry=docker.io -c Release /t:PublishContainer

    - name: "Extract latest release notes"
      shell: pwsh
      run: |
        $content = Get-Content RELEASE_NOTES.md -Raw
        # Match from the first #### heading to just before the second one
        if ($content -match '(?s)(####.+?)(?=\n####|\z)') {
          $Matches[1].Trim() | Set-Content RELEASE_NOTES_LATEST.md
        } else {
          $content | Set-Content RELEASE_NOTES_LATEST.md
        }

    - name: release
      uses: actions/create-release@v1
      id: create_release
      with:
        draft: false
        prerelease: false
        release_name: 'Memorizer ${{ github.ref_name }}'
        tag_name: ${{ github.ref }}
        body_path: RELEASE_NOTES_LATEST.md
      env:
        GITHUB_TOKEN: ${{ github.token }}
